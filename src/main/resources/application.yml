server:
  port: 4545

spring:
  application:
    name: roundtable
  ai:
    mcp:
      server:
        name: roundtable
        version: 0.1.0
        type: SYNC
        protocol: STREAMABLE
        annotation-scanner:
          enabled: true
  datasource:
    url: jdbc:h2:file:./data/agentcomm;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.satran004.agentcomm: DEBUG
